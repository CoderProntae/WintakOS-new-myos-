name: WintakOS Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Milestone 10 - Derle ve Test Et
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak kodunu indir
        uses: actions/checkout@v4

      - name: Derleme araclarini kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-multilib nasm \
            grub-pc-bin grub-common xorriso mtools \
            qemu-system-x86

      - name: Kernel derle
        run: make all

      - name: Kernel dogrulama
        run: make verify

      - name: QEMU boot testi
        run: |
          timeout 5 qemu-system-i386 \
            -cdrom wintakos.iso -m 512M \
            -display none -serial stdio \
            -no-reboot -no-shutdown 2>&1 || true

      - name: ISO artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: wintakos-iso-m10
          path: wintakos.iso
          retention-days: 30
