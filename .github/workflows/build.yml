#=============================================================================
# WintakOS - GitHub Actions CI/CD Pipeline
#
# Her push ve pull request'te otomatik olarak:
#   1. Gerekli araçları kurar (nasm, gcc, grub, xorriso, qemu)
#   2. Kernel'i derler
#   3. Bootable ISO oluşturur
#   4. ISO'yu artifact olarak yükler (indirilebilir)
#   5. QEMU'da otomatik boot testi yapar
#=============================================================================

name: WintakOS Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Derle ve Test Et
    runs-on: ubuntu-latest

    steps:
      #--- 1. Kaynak kodunu indir ---
      - name: Kaynak kodunu indir
        uses: actions/checkout@v4

      #--- 2. Derleme araçlarını kur ---
      - name: Derleme araclarini kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            nasm \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            qemu-system-x86

      #--- 3. Araç versiyonlarını göster (debug için) ---
      - name: Arac versiyonlari
        run: |
          echo "=== GCC ==="
          gcc --version | head -1
          echo "=== NASM ==="
          nasm --version
          echo "=== GRUB ==="
          grub-mkrescue --version
          echo "=== QEMU ==="
          qemu-system-i386 --version | head -1

      #--- 4. Kernel'i derle ---
      - name: Kernel derle
        run: make all

      #--- 5. Dosya kontrolü ---
      - name: Cikti dosyalarini kontrol et
        run: |
          echo "=== Kernel Binary ==="
          file wintakos.bin
          ls -lh wintakos.bin
          echo ""
          echo "=== ISO Dosyasi ==="
          file wintakos.iso
          ls -lh wintakos.iso
          echo ""
          echo "=== Multiboot2 Basligi Kontrolu ==="
          grub-file --is-x86-multiboot2 wintakos.bin && \
            echo "BASARILI: Multiboot2 uyumlu kernel" || \
            echo "HATA: Multiboot2 basligi bulunamadi!"

      #--- 6. QEMU ile otomatik boot testi ---
      # Kernel'i 3 saniye çalıştır, çökme olup olmadığını kontrol et
      - name: QEMU boot testi
        run: |
          echo "QEMU boot testi baslatiliyor (3 saniye)..."
          timeout 3 qemu-system-i386 \
            -cdrom wintakos.iso \
            -m 128M \
            -display none \
            -serial stdio \
            -no-reboot \
            -no-shutdown 2>&1 || true
          echo "Boot testi tamamlandi (timeout beklenen davranis)."

      #--- 7. ISO'yu artifact olarak yükle ---
      - name: ISO artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: wintakos-iso
          path: wintakos.iso
          retention-days: 30

      #--- 8. Kernel binary'yi de yükle ---
      - name: Kernel binary artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: wintakos-kernel
          path: wintakos.bin
          retention-days: 30
