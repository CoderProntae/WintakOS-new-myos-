#=============================================================================
# WintakOS - GRUB Bootloader Yapılandırması
#
# Multiboot2 protokolü ile kernel'i yükler.
# timeout: Kullanıcıya menüde bekleme süresi (saniye)
#=============================================================================

set timeout=4
set default=0

menuentry "WintakOS v0.1 Milestone" {
    set gfxmode=800x600x32
    set gfxpayload=keep
    multiboot2 /boot/wintakos.bin
    boot
}

menuentry "WintakOS v0.1 - Guvenli Mod" {
    multiboot2 /boot/wintakos.bin
    boot
}
